<!DOCTYPE html>
<!-- POPUP INTERFACE HTML  ─ DataVault Liquid Glass Edition
     Drop-in replacement for the original popup-interface.html.
     All JS hooks (IDs, classes used by popup-controller.js) are preserved.
     Only the visual layer has changed.
-->
<html>
<head>
  <meta charset="UTF-8">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    /* ═══════════════════════════════════════════════
       0. CSS VARIABLES — mirrors globals.css exactly
       ═══════════════════════════════════════════════ */
    :root {
      --color-background:        rgb(10, 10, 11);
      --color-foreground:        rgb(255, 255, 255);

      --color-liquid-bg:         rgba(255,255,255,0.08);
      --color-liquid-border:     rgba(255,255,255,0.18);
      --color-liquid-highlight:  rgba(255,255,255,0.45);
      --color-liquid-shadow:     rgba(0,0,0,0.30);

      --color-surface-hover:     rgba(255,255,255,0.06);
      --color-surface-border:    rgba(255,255,255,0.10);
      --color-surface-elevated:  rgba(255,255,255,0.04);
      --color-separator:         rgba(255,255,255,0.08);

      --color-accent:            rgb(167,139,250);
      --color-accent-dim:        rgba(167,139,250,0.15);
      --color-cyan:              rgb(34,211,238);
      --color-cyan-dim:          rgba(34,211,238,0.15);
      --color-emerald:           rgb(52,211,153);
      --color-emerald-dim:       rgba(52,211,153,0.15);
      --color-danger:            rgb(255,69,58);
      --color-danger-dim:        rgba(255,69,58,0.15);

      --color-label:             rgb(255,255,255);
      --color-label-secondary:   rgb(174,174,178);
      --color-label-tertiary:    rgb(142,142,147);

      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "SF Pro Display", system-ui, sans-serif;
    }

    /* ═══════════════════════════════════════════════
       1. RESET & BASE
       ═══════════════════════════════════════════════ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 300px;
      font-family: var(--font-sans);
      background: var(--color-background);
      color: var(--color-foreground);
      -webkit-font-smoothing: antialiased;
      overflow: hidden;
      position: relative;
    }

    /* ═══════════════════════════════════════════════
       2. AMBIENT ORBS  (matches sidebar-orb logic)
       ═══════════════════════════════════════════════ */
    .orb {
      position: fixed;
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
      opacity: 0.35;
      animation: fluid-blob 25s ease-in-out infinite;
    }
    .orb-violet {
      width: 220px; height: 220px;
      top: -60px; left: -60px;
      background: radial-gradient(circle, rgba(99,102,241,0.45) 0%, transparent 70%);
      filter: blur(60px);
      animation-duration: 28s;
    }
    .orb-cyan {
      width: 180px; height: 180px;
      bottom: -50px; right: -40px;
      background: radial-gradient(circle, rgba(34,211,238,0.35) 0%, transparent 70%);
      filter: blur(50px);
      animation-duration: 35s;
      animation-direction: reverse;
    }
    @keyframes fluid-blob {
      0%,100% { transform: translate(0,0) scale(1); }
      33%      { transform: translate(30px,-40px) scale(1.12); }
      66%      { transform: translate(-20px,25px) scale(0.92); }
    }

    /* ═══════════════════════════════════════════════
       3. SHELL — the popup card itself (sidebar-shell)
       ═══════════════════════════════════════════════ */
    .popup-shell {
      position: relative;
      z-index: 1;
      padding: 20px 16px 16px;
      background: rgba(12,12,16,0.72);
      backdrop-filter: blur(72px) saturate(180%);
      -webkit-backdrop-filter: blur(72px) saturate(180%);
      min-height: 100vh; /* fills popup viewport */
    }

    /* ═══════════════════════════════════════════════
       4. HEADER
       ═══════════════════════════════════════════════ */
    .popup-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--color-separator);
      margin-bottom: 16px;
    }
    .logo-icon {
      width: 32px; height: 32px;
      border-radius: 10px;
      background: rgba(139,92,246,0.18);
      border: 1px solid rgba(139,92,246,0.28);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    /* SVG shield icon inline */
    .logo-icon svg { width: 16px; height: 16px; color: var(--color-accent); }

    .header-text h2 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.01em;
      color: var(--color-label);
      line-height: 1;
    }
    .header-text p {
      font-size: 10px;
      font-weight: 500;
      color: rgba(255,255,255,0.35);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      margin-top: 3px;
    }

    /* ═══════════════════════════════════════════════
       5. STATUS BADGE
       ═══════════════════════════════════════════════ */
    #statusBadge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 4px 10px 4px 8px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      margin-bottom: 16px;
      transition: background 0.3s ease, color 0.3s ease, border-color 0.3s ease;
    }
    #statusBadge::before {
      content: "";
      display: block;
      width: 6px; height: 6px;
      border-radius: 50%;
      flex-shrink: 0;
      transition: background 0.3s ease;
    }

    /* Inactive */
    #statusBadge.inactive {
      background: var(--color-danger-dim);
      color: var(--color-danger);
      border: 1px solid rgba(255,69,58,0.2);
    }
    #statusBadge.inactive::before { background: var(--color-danger); }

    /* Active */
    #statusBadge.active {
      background: var(--color-emerald-dim);
      color: var(--color-emerald);
      border: 1px solid rgba(52,211,153,0.2);
    }
    #statusBadge.active::before {
      background: var(--color-emerald);
      box-shadow: 0 0 6px var(--color-emerald);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    @keyframes pulse-dot {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.4; }
    }

    /* ═══════════════════════════════════════════════
       6. BUTTONS  (matches btn-success / btn-danger / btn-secondary)
       ═══════════════════════════════════════════════ */
    button {
      width: 100%;
      padding: 9px 14px;
      border: none;
      border-radius: 12px;
      font-family: var(--font-sans);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      margin-bottom: 7px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      transition: opacity 0.2s ease, transform 0.15s ease, background 0.2s ease;
      position: relative;
      overflow: hidden;
    }
    button:hover:not(:disabled) {
      opacity: 0.88;
      transform: translateY(-1px);
    }
    button:active:not(:disabled) {
      transform: scale(0.98);
    }
    button:disabled {
      opacity: 0.30;
      cursor: not-allowed;
      transform: none;
    }

    /* Primary actions */
    #startBtn   { background: var(--color-emerald);    color: #fff; }
    #stopBtn    { background: var(--color-danger);     color: #fff; }

    /* Secondary — glass style */
    #previewBtn {
      background: var(--color-surface-elevated);
      color: var(--color-label-secondary);
      border: 1px solid var(--color-surface-border);
    }
    #previewBtn:hover:not(:disabled) {
      background: var(--color-surface-hover);
      color: var(--color-label);
      border-color: rgba(255,255,255,0.15);
    }

    /* ═══════════════════════════════════════════════
       7. SECTION DIVIDER / LABEL
       ═══════════════════════════════════════════════ */
    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.1em;
      color: rgba(255,255,255,0.35);
      margin: 10px 0 7px;
    }

    /* ═══════════════════════════════════════════════
       8. EXPORT ROW — glass-sm style buttons
       ═══════════════════════════════════════════════ */
    .export-row {
      display: flex;
      gap: 6px;
      margin-bottom: 8px;
    }
    .export-row button {
      flex: 1;
      font-size: 11px;
      font-weight: 600;
      padding: 8px 4px;
      margin-bottom: 0;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      color: var(--color-label-secondary);
      border-radius: 12px;
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
    }
    .export-row button:hover:not(:disabled) {
      background: rgba(255,255,255,0.09);
      color: var(--color-label);
      border-color: rgba(255,255,255,0.15);
    }
    /* Accent tint per type */
    #exportCsv:not(:disabled):hover   { border-color: rgba(52,211,153,0.3);  color: var(--color-emerald); }
    #exportPdf:not(:disabled):hover   { border-color: rgba(255,69,58,0.3);   color: var(--color-danger);  }
    #exportJson:not(:disabled):hover  { border-color: rgba(167,139,250,0.3); color: var(--color-accent);  }

    /* ═══════════════════════════════════════════════
       9. SESSION INFO
       ═══════════════════════════════════════════════ */
    .session-info {
      font-size: 9px;
      color: rgba(255,255,255,0.25);
      word-break: break-all;
      margin-bottom: 6px;
      font-feature-settings: "tnum";
    }

    /* ═══════════════════════════════════════════════
       10. PREVIEW BOX — glass card style
       ═══════════════════════════════════════════════ */
    #previewBox {
      display: none;
      margin-top: 10px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 14px;
      padding: 12px 14px;
      font-size: 11px;
      color: var(--color-label-secondary);
      line-height: 1.8;
      backdrop-filter: blur(40px);
      -webkit-backdrop-filter: blur(40px);

      /* inner highlight — matches liquid-glass::before */
      position: relative;
      overflow: hidden;
    }
    #previewBox::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.06) 0%, transparent 50%);
      pointer-events: none;
    }
    #previewBox b {
      color: var(--color-label);
      font-weight: 600;
    }

    /* ═══════════════════════════════════════════════
       11. DIVIDER LINE
       ═══════════════════════════════════════════════ */
    .divider {
      height: 1px;
      background: var(--color-separator);
      margin: 12px 0;
    }
  </style>
</head>
<body>

  <!-- Ambient orbs — same depth system as BackgroundBlobs.tsx -->
  <div class="orb orb-violet"></div>
  <div class="orb orb-cyan"></div>

  <div class="popup-shell">

    <!-- HEADER -->
    <div class="popup-header">
      <div class="logo-icon">
        <!-- Inline shield SVG (mirrors sidebar Shield icon) -->
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" style="color:rgb(167,139,250)">
          <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
        </svg>
      </div>
      <div class="header-text">
        <h2>DataVault</h2>
        <p>Privacy-first capture</p>
      </div>
    </div>

    <!-- STATUS BADGE -->
    <div id="statusBadge" class="status-badge inactive">Inactive</div>

    <!-- PRIMARY ACTIONS -->
    <button id="startBtn">
      <!-- play icon -->
      <svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
      Start Session
    </button>
    <button id="stopBtn" disabled>
      <!-- stop icon -->
      <svg width="10" height="10" viewBox="0 0 24 24" fill="currentColor"><rect x="4" y="4" width="16" height="16" rx="2"/></svg>
      Stop Session
    </button>

    <div class="divider"></div>

    <!-- PREVIEW -->
    <button id="previewBtn" disabled>
      <!-- eye icon -->
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
      </svg>
      Preview My Profile
    </button>

    <!-- SESSION ID -->
    <div class="session-info" id="sessionInfo"></div>

    <!-- EXPORT -->
    <div class="section-label">Export Session</div>
    <div class="export-row">
      <button id="exportCsv"  disabled>↓ CSV</button>
      <button id="exportPdf"  disabled>↓ PDF</button>
      <button id="exportJson" disabled>↓ JSON</button>
    </div>

    <!-- PREVIEW DATA BOX -->
    <div id="previewBox"></div>

  </div><!-- /.popup-shell -->

  <script src="popup-controller.js"></script>
</body>
</html>
